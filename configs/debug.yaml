seed: 42

data:
  train_path: examples/sample_data/train.jsonl
  valid_path: examples/sample_data/valid.jsonl
  test_path: examples/sample_data/test.jsonl
  src_vocab_path: examples/sample_data/vocab.en.json
  tgt_vocab_path: examples/sample_data/vocab.zh.json
  src_max_len: 64
  tgt_max_len: 64
  num_workers: 0

model:
  d_model: 128
  n_heads: 4
  num_encoder_layers: 2
  num_decoder_layers: 2
  dim_feedforward: 512
  dropout: 0.1
  max_len: 256

train:
  output_dir: checkpoints/debug
  batch_size: 4
  epochs: 1
  learning_rate: 1.0
  warmup_steps: 100
  weight_decay: 0.01
  label_smoothing: 0.1
  grad_clip: 1.0
  log_every: 1
  eval_every_epochs: 1
  save_every_epochs: 1
  amp: false

decode:
  max_len: 80
  num_examples: 5
