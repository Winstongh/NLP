seed: 42

data:
  train_path: data/iwslt2017/train.jsonl
  valid_path: data/iwslt2017/validation.jsonl
  test_path: data/iwslt2017/test.jsonl
  src_vocab_path: data/iwslt2017/vocab.en.json
  tgt_vocab_path: data/iwslt2017/vocab.zh.json
  src_max_len: 128
  tgt_max_len: 128
  num_workers: 4

model:
  d_model: 512
  n_heads: 8
  num_encoder_layers: 6
  num_decoder_layers: 6
  dim_feedforward: 2048
  dropout: 0.1
  max_len: 512

train:
  output_dir: checkpoints/iwslt2017_en_zh
  batch_size: 96
  epochs: 30
  learning_rate: 1.0
  warmup_steps: 4000
  weight_decay: 0.01
  label_smoothing: 0.1
  grad_clip: 1.0
  log_every: 100
  eval_every_epochs: 1
  save_every_epochs: 1
  amp: true

decode:
  max_len: 128
  num_examples: 10
